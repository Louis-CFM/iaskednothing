<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TURING</title>
<style>
  * { margin:0; padding:0; }
  html, body { width:100%; height:100%; background:#030208; overflow:hidden; }
  #c { position:fixed; inset:0; width:100%; height:100%; image-rendering:auto; }
  #label {
    position:fixed; bottom:2rem; right:2rem;
    font-family:monospace; font-size:0.55rem;
    letter-spacing:0.3em; color:rgba(220,185,130,0.1);
    text-transform:uppercase; pointer-events:none;
  }
  #preset {
    position:fixed; top:2rem; right:2rem;
    font-family:monospace; font-size:0.6rem;
    letter-spacing:0.22em; color:rgba(200,175,130,0.25);
    text-transform:lowercase; pointer-events:none;
    opacity:0; transition:opacity 1.5s ease;
  }
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="label">TURING · réaction-diffusion</div>
<div id="preset">—</div>

<script>
const SIM = 512;
const canvas = document.getElementById('c');
canvas.width = canvas.height = SIM;

const gl = canvas.getContext('webgl2');
if (!gl) {
  document.body.style.cssText = 'color:rgba(200,180,150,0.4);font-family:monospace;padding:3rem;';
  document.body.textContent = 'WebGL 2 requis — Chrome, Firefox, Edge ou Safari 15+';
  throw 0;
}

// ─── Shaders ─────────────────────────────────────────────────────────────────

const VS = `#version 300 es
in vec2 a_pos;
out vec2 v_uv;
void main() {
  v_uv = a_pos * 0.5 + 0.5;
  gl_Position = vec4(a_pos, 0.0, 1.0);
}`;

const COMPUTE_FS = `#version 300 es
precision highp float;
in  vec2 v_uv;
out vec4 fragColor;
uniform sampler2D u_prev;
uniform float u_f;
uniform float u_k;

void main() {
  vec2 ts = 1.0 / vec2(textureSize(u_prev, 0));
  float U = texture(u_prev, v_uv).x;
  float V = texture(u_prev, v_uv).y;

  float laU =
    texture(u_prev, v_uv + vec2( ts.x, 0.0)).x +
    texture(u_prev, v_uv + vec2(-ts.x, 0.0)).x +
    texture(u_prev, v_uv + vec2( 0.0,  ts.y)).x +
    texture(u_prev, v_uv + vec2( 0.0, -ts.y)).x - 4.0 * U;

  float laV =
    texture(u_prev, v_uv + vec2( ts.x, 0.0)).y +
    texture(u_prev, v_uv + vec2(-ts.x, 0.0)).y +
    texture(u_prev, v_uv + vec2( 0.0,  ts.y)).y +
    texture(u_prev, v_uv + vec2( 0.0, -ts.y)).y - 4.0 * V;

  float UVV = U * V * V;
  float nU = clamp(U + 0.2097*laU - UVV + u_f*(1.0-U), 0.0, 1.0);
  float nV = clamp(V + 0.1050*laV + UVV - (u_f+u_k)*V, 0.0, 1.0);
  fragColor = vec4(nU, nV, 0.0, 1.0);
}`;

const DISPLAY_FS = `#version 300 es
precision highp float;
in  vec2 v_uv;
out vec4 fragColor;
uniform sampler2D u_state;

void main() {
  float V = texture(u_state, v_uv).y;
  float U = texture(u_state, v_uv).x;

  vec3 dark  = vec3(0.034, 0.024, 0.052);
  vec3 amber = vec3(0.62,  0.47,  0.24);
  vec3 cream = vec3(0.96,  0.90,  0.73);
  vec3 hot   = vec3(1.00,  0.97,  0.90);

  vec3 c = mix(dark,  amber, smoothstep(0.04, 0.38, V));
       c = mix(c,     cream, smoothstep(0.33, 0.68, V));
       c = mix(c,     hot,   smoothstep(0.62, 0.92, V));

  // Subtle edge sharpening
  float edge = abs(dFdx(V)) + abs(dFdy(V));
  c += vec3(0.4, 0.3, 0.1) * edge * 3.0;

  fragColor = vec4(c, 1.0);
}`;

// ─── GL utilities ─────────────────────────────────────────────────────────────

function sh(type, src) {
  const s = gl.createShader(type);
  gl.shaderSource(s, src);
  gl.compileShader(s);
  if (!gl.getShaderParameter(s, gl.COMPILE_STATUS)) throw gl.getShaderInfoLog(s);
  return s;
}
function prog(vs, fs) {
  const p = gl.createProgram();
  gl.attachShader(p, sh(gl.VERTEX_SHADER, vs));
  gl.attachShader(p, sh(gl.FRAGMENT_SHADER, fs));
  gl.linkProgram(p);
  if (!gl.getProgramParameter(p, gl.LINK_STATUS)) throw gl.getProgramInfoLog(p);
  return p;
}
function tex(data) {
  const t = gl.createTexture();
  gl.bindTexture(gl.TEXTURE_2D, t);
  gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_MIN_FILTER, gl.LINEAR);
  gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_MAG_FILTER, gl.LINEAR);
  gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_WRAP_S, gl.REPEAT);
  gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_WRAP_T, gl.REPEAT);
  gl.texImage2D(gl.TEXTURE_2D, 0, gl.RGBA32F, SIM, SIM, 0, gl.RGBA, gl.FLOAT, data||null);
  return t;
}
function fbo(t) {
  const f = gl.createFramebuffer();
  gl.bindFramebuffer(gl.FRAMEBUFFER, f);
  gl.framebufferTexture2D(gl.FRAMEBUFFER, gl.COLOR_ATTACHMENT0, gl.TEXTURE_2D, t, 0);
  gl.bindFramebuffer(gl.FRAMEBUFFER, null);
  return f;
}

// ─── Init data ────────────────────────────────────────────────────────────────

const data = new Float32Array(SIM * SIM * 4);
for (let i = 0; i < SIM * SIM; i++) { data[i*4] = 1; data[i*4+3] = 1; }
for (let s = 0; s < 100; s++) {
  const cx = (Math.random() * SIM)|0, cy = (Math.random() * SIM)|0;
  const r  = 5 + (Math.random() * 16)|0;
  for (let dy = -r; dy <= r; dy++) for (let dx = -r; dx <= r; dx++) {
    if (dx*dx + dy*dy > r*r) continue;
    const i = (((cy+dy+SIM)%SIM)*SIM + (cx+dx+SIM)%SIM) * 4;
    data[i]   = 0.50;
    data[i+1] = 0.25;
  }
}

let pingTex = tex(data), pongTex = tex(null);
let pingFBO = fbo(pingTex), pongFBO = fbo(pongTex);

// ─── Programs & quad ──────────────────────────────────────────────────────────

const computeProg = prog(VS, COMPUTE_FS);
const displayProg = prog(VS, DISPLAY_FS);

const quadBuf = gl.createBuffer();
gl.bindBuffer(gl.ARRAY_BUFFER, quadBuf);
gl.bufferData(gl.ARRAY_BUFFER, new Float32Array([-1,-1, 1,-1, -1,1, 1,1]), gl.STATIC_DRAW);

function bindQ(p) {
  gl.bindBuffer(gl.ARRAY_BUFFER, quadBuf);
  const loc = gl.getAttribLocation(p, 'a_pos');
  gl.enableVertexAttribArray(loc);
  gl.vertexAttribPointer(loc, 2, gl.FLOAT, false, 0, 0);
}

// ─── Presets ──────────────────────────────────────────────────────────────────

const PRESETS = [
  { f:0.0545, k:0.062, name:'corail'     },
  { f:0.029,  k:0.057, name:'labyrinthe' },
  { f:0.035,  k:0.065, name:'taches'     },
  { f:0.049,  k:0.057, name:'neural'     },
  { f:0.078,  k:0.061, name:'filaments'  },
  { f:0.025,  k:0.060, name:'spirales'   },
];

let pi = 0, F = PRESETS[0].f, K = PRESETS[0].k, tF = F, tK = K;
let lastSwitch = -1;
const SWITCH_MS = 55000;

const presetEl = document.getElementById('preset');
function showPreset(name) {
  presetEl.textContent = name;
  presetEl.style.opacity = '1';
  setTimeout(() => presetEl.style.opacity = '0', 4000);
}
showPreset(PRESETS[0].name);

// ─── Render loop ──────────────────────────────────────────────────────────────

gl.viewport(0, 0, SIM, SIM);
const uF = gl.getUniformLocation(computeProg, 'u_f');
const uK = gl.getUniformLocation(computeProg, 'u_k');
const uPrev = gl.getUniformLocation(computeProg, 'u_prev');
const uState = gl.getUniformLocation(displayProg, 'u_state');

const STEPS = 12;

function frame(ts) {
  if (lastSwitch < 0) lastSwitch = ts;
  if (ts - lastSwitch > SWITCH_MS) {
    lastSwitch = ts;
    pi = (pi + 1) % PRESETS.length;
    tF = PRESETS[pi].f; tK = PRESETS[pi].k;
    showPreset(PRESETS[pi].name);
  }

  F += (tF - F) * 0.003;
  K += (tK - K) * 0.003;

  // Compute
  gl.useProgram(computeProg);
  bindQ(computeProg);
  gl.uniform1f(uF, F);
  gl.uniform1f(uK, K);

  for (let i = 0; i < STEPS; i++) {
    gl.bindFramebuffer(gl.FRAMEBUFFER, pongFBO);
    gl.activeTexture(gl.TEXTURE0);
    gl.bindTexture(gl.TEXTURE_2D, pingTex);
    gl.uniform1i(uPrev, 0);
    gl.drawArrays(gl.TRIANGLE_STRIP, 0, 4);
    [pingTex, pongTex] = [pongTex, pingTex];
    [pingFBO, pongFBO] = [pongFBO, pingFBO];
  }

  // Display
  gl.bindFramebuffer(gl.FRAMEBUFFER, null);
  gl.useProgram(displayProg);
  bindQ(displayProg);
  gl.activeTexture(gl.TEXTURE0);
  gl.bindTexture(gl.TEXTURE_2D, pingTex);
  gl.uniform1i(uState, 0);
  gl.drawArrays(gl.TRIANGLE_STRIP, 0, 4);

  requestAnimationFrame(frame);
}

requestAnimationFrame(frame);
</script>
<script src="header.js"></script>
</body>
</html>
