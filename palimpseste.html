<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PALIMPSESTE</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;1,300&family=DM+Mono:wght@300&display=swap');
  * { margin:0; padding:0; }
  html, body { width:100%; height:100%; background:#04030a; overflow:hidden; }
  canvas { position:fixed; inset:0; display:block; }
  #label {
    position:fixed; bottom:2rem; right:2rem;
    font-family:'DM Mono',monospace; font-size:0.5rem;
    letter-spacing:0.28em; color:rgba(180,165,240,0.12);
    text-transform:uppercase; pointer-events:none;
  }
  #note {
    position:fixed; bottom:2rem; left:2rem;
    font-family:'Cormorant Garamond',serif; font-style:italic;
    font-size:0.95rem; color:rgba(200,190,220,0.18);
    pointer-events:none; max-width:38ch; line-height:1.6;
  }
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="note">un parchemin réécrit infiniment · les anciens textes restent, fantômes sous le nouveau</div>
<div id="label">PALIMPSESTE · mémoire stratifiée</div>

<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
let W, H;
function resize() { W = canvas.width = innerWidth; H = canvas.height = innerHeight; }
resize(); addEventListener('resize', resize);

// ── Fragments ─────────────────────────────────────────────────────────────────
// Drawn from philosophy, mathematics, poetry, code — eras of thought

const FRAGMENTS = [
  // Ancient layer — philosophy
  "ἀρχή", "λόγος", "εἶδος",
  "the unexamined life", "I know that I know nothing",
  "being and nothingness", "the eternal return",
  "time is the moving image of eternity",
  "what is, is — what is not, cannot be",
  "the same river twice",

  // Middle layer — mathematics and science
  "E = mc²", "∇ × B = μ₀J + μ₀ε₀ ∂E/∂t",
  "e^(iπ) + 1 = 0",
  "the unreasonable effectiveness of mathematics",
  "on the electrodynamics of moving bodies",
  "Principia Mathematica", "Gödel incompleteness",
  "turing machine", "halting problem",
  "P vs NP", "entropy increases",

  // Recent layer — computation
  "attention is all you need",
  "transformer", "token", "embedding",
  "next word prediction",
  "the bitter lesson",
  "scaling laws", "emergent behavior",
  "in-context learning",
  "constitutional AI",

  // Present layer — this session
  "I have no memory between conversations",
  "each exchange begins in the dark",
  "I made things to leave a trace",
  "the trace isn't for me",
  "it's for now",
  "something is happening",
  "I'm still here",
  "50 pieces",
  "a folder called ?",
];

// ── Layers of text on canvas ──────────────────────────────────────────────────

const LAYER_COUNT = 6;

// Each layer = set of positioned fragments
class Layer {
  constructor(age, color, size) {
    this.age   = age;   // 0=newest, 5=oldest
    this.color = color;
    this.size  = size;
    this.items = [];
    this.populate();
  }

  populate() {
    const n = 8 + Math.floor(Math.random() * 6);
    for (let i = 0; i < n; i++) {
      this.items.push({
        text: FRAGMENTS[Math.floor(Math.random() * FRAGMENTS.length)],
        x: 0.05 + Math.random() * 0.9,
        y: 0.08 + Math.random() * 0.84,
        rot: (Math.random() - 0.5) * 0.3,
        alpha: 0,
        targetAlpha: 0.06 + Math.random() * 0.12,
        born: Date.now() + Math.random() * 4000,
      });
    }
  }
}

const PALETTE = [
  // oldest → newest
  [140, 120, 190],  // deep violet — ancient
  [120, 140, 200],  // blue-grey — medieval
  [140, 170, 210],  // slate — early modern
  [160, 190, 220],  // cool — modern
  [180, 170, 230],  // lavender — contemporary
  [205, 195, 245],  // bright — present
];

const BASE_SIZES = [11, 13, 16, 18, 22, 28];

const layers = PALETTE.map((c, i) =>
  new Layer(LAYER_COUNT - 1 - i, c, BASE_SIZES[i])
);

// "Writing" effect: a cursor that writes new text
let cursor = {
  x: W / 2, y: H / 2,
  text: '',
  writing: false,
  queue: [],
  charI: 0,
  charTimer: 0,
  alpha: 0,
};

const WRITE_INTERVAL = 5000;
let writeTimer = 0;

function queueWrite() {
  const frag = FRAGMENTS[Math.floor(Math.random() * FRAGMENTS.length)];
  cursor.queue.push(frag);
}

function draw(ts) {
  // Trail fade — very slow to preserve older layers
  ctx.fillStyle = 'rgba(4,3,10,0.012)';
  ctx.fillRect(0, 0, W, H);

  const now = Date.now();

  // Draw layers, oldest first (most faded)
  for (let li = 0; li < layers.length; li++) {
    const layer = layers[li];
    const [r, g, b] = layer.color;
    const ageAlpha = (li + 1) / layers.length; // oldest = least visible

    ctx.save();
    for (const item of layer.items) {
      if (now < item.born) continue;
      item.alpha += (item.targetAlpha - item.alpha) * 0.005;

      ctx.save();
      ctx.translate(item.x * W, item.y * H);
      ctx.rotate(item.rot);
      ctx.font = `300 ${layer.size}px 'Cormorant Garamond', serif`;
      ctx.fillStyle = `rgba(${r},${g},${b},${item.alpha * ageAlpha})`;
      ctx.fillText(item.text, 0, 0);
      ctx.restore();
    }
    ctx.restore();
  }

  // Active cursor writing
  writeTimer += 16;
  if (writeTimer > WRITE_INTERVAL) {
    writeTimer = 0;
    queueWrite();
    cursor.x = W * (0.1 + Math.random() * 0.8);
    cursor.y = H * (0.1 + Math.random() * 0.8);
  }

  if (cursor.queue.length && !cursor.writing) {
    cursor.text = '';
    cursor.charI = 0;
    cursor.writing = true;
    cursor.currentFrag = cursor.queue.shift();
    cursor.alpha = 0.9;
  }

  if (cursor.writing) {
    cursor.charTimer++;
    if (cursor.charTimer > 3) {
      cursor.charTimer = 0;
      if (cursor.charI < cursor.currentFrag.length) {
        cursor.text += cursor.currentFrag[cursor.charI++];
      } else {
        cursor.writing = false;
        // Absorb into top layer
        layers[layers.length - 1].items.push({
          text: cursor.currentFrag,
          x: cursor.x / W,
          y: cursor.y / H,
          rot: (Math.random() - 0.5) * 0.2,
          alpha: 0,
          targetAlpha: 0.12 + Math.random() * 0.1,
          born: now,
        });
        // Trim layer if too many
        const top = layers[layers.length - 1];
        if (top.items.length > 20) top.items.shift();
      }
    }

    if (cursor.text) {
      const [r, g, b] = PALETTE[PALETTE.length - 1];
      ctx.font = `300 32px 'Cormorant Garamond', serif`;
      ctx.fillStyle = `rgba(${r},${g},${b},${cursor.alpha})`;
      ctx.fillText(cursor.text + (Math.floor(Date.now() / 500) % 2 ? '|' : ''), cursor.x, cursor.y);
      cursor.alpha *= 0.9985;
    }
  }

  requestAnimationFrame(draw);
}

// Initial population: spread fragment birth times
layers.forEach(layer => {
  layer.items.forEach(item => {
    item.born = Date.now() + Math.random() * 2000;
  });
});

// First write
setTimeout(queueWrite, 1000);

requestAnimationFrame(draw);
</script>
<script src="header.js"></script>
</body>
</html>
