<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FLUX</title>
<style>
  * { margin: 0; padding: 0; }
  html, body { width: 100%; height: 100%; background: #03080a; overflow: hidden; }
  canvas { display: block; }
  #label {
    position: fixed;
    bottom: 2rem; right: 2rem;
    font-family: monospace;
    font-size: 0.55rem;
    letter-spacing: 0.3em;
    color: rgba(100, 200, 200, 0.1);
    text-transform: uppercase;
  }
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="label">FLUX</div>
<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
let W, H, frame = 0;

function resize() {
  W = canvas.width = window.innerWidth;
  H = canvas.height = window.innerHeight;
}
resize();
window.addEventListener('resize', () => { resize(); init(); });

const N = 4000;
const particles = new Float32Array(N * 4); // x, y, age, speed

function init() {
  for (let i = 0; i < N; i++) {
    const b = i * 4;
    particles[b]     = Math.random() * W;      // x
    particles[b + 1] = Math.random() * H;      // y
    particles[b + 2] = Math.random() * 300;    // age (stagger)
    particles[b + 3] = 0.4 + Math.random() * 0.8; // speed
  }
}

// Vector field: angle at position (x, y, t)
function angle(x, y, t) {
  const nx = x / W;
  const ny = y / H;
  const tt = t * 0.0004;

  return (
    Math.sin(nx * 3.1 + tt * 1.1) * Math.cos(ny * 2.3 - tt * 0.7) * Math.PI * 2 +
    Math.cos(nx * 1.7 - tt * 0.9 + ny * 4.1) * Math.PI * 0.8 +
    Math.sin((nx + ny) * 2.5 + tt * 1.3) * Math.PI * 0.6
  );
}

function tick() {
  frame++;

  // Slow fade — creates trails
  ctx.fillStyle = 'rgba(3, 8, 10, 0.12)';
  ctx.fillRect(0, 0, W, H);

  const t = frame;
  const hueBase = 180 + Math.sin(t * 0.002) * 20; // slow hue drift: 160-200 (teal-cyan)

  for (let i = 0; i < N; i++) {
    const b = i * 4;
    let x = particles[b];
    let y = particles[b + 1];
    const age = ++particles[b + 2];
    const speed = particles[b + 3];

    const a = angle(x, y, t);
    const nx = x + Math.cos(a) * speed;
    const ny = y + Math.sin(a) * speed;

    // Life and alpha
    const lifeMax = 200 + (i % 150);
    const lifePct = Math.min(1, age / 30) * Math.max(0, 1 - (age % lifeMax) / lifeMax);
    const alpha = lifePct * 0.5;

    if (alpha > 0.01) {
      const hue = hueBase + Math.sin(x * 0.005 + t * 0.001) * 25;
      const light = 50 + lifePct * 25;
      ctx.strokeStyle = `hsla(${hue}, 70%, ${light}%, ${alpha})`;
      ctx.lineWidth = 0.7 + lifePct * 0.5;
      ctx.beginPath();
      ctx.moveTo(x, y);
      ctx.lineTo(nx, ny);
      ctx.stroke();
    }

    particles[b] = nx;
    particles[b + 1] = ny;

    // Reset if out of bounds or too old
    const cycleAge = age % lifeMax;
    if (nx < -2 || nx > W + 2 || ny < -2 || ny > H + 2 || cycleAge < 1) {
      particles[b]     = Math.random() * W;
      particles[b + 1] = Math.random() * H;
    }
  }

  requestAnimationFrame(tick);
}

init();
requestAnimationFrame(tick);
</script>
<script src="back.js"></script>
</body>
</html>
