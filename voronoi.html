<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VORONOÏ</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Mono&display=swap');
  * { margin:0; padding:0; }
  html, body { width:100%; height:100%; background:#020208; overflow:hidden; }
  canvas { position:fixed; inset:0; display:block; }
  #label {
    position:fixed; bottom:2rem; right:2rem;
    font-family:'DM Mono',monospace; font-size:0.55rem;
    letter-spacing:0.3em; color:rgba(160,160,200,0.08);
    text-transform:uppercase; pointer-events:none;
  }
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="label">VORONOÏ · tessellation</div>

<script>
const canvas = document.getElementById('c');
const gl = canvas.getContext('webgl2') || canvas.getContext('webgl');
if (!gl) { document.body.textContent='WebGL requis'; throw 0; }

// ─── Shaders ──────────────────────────────────────────────────────────────────

const VS = `
attribute vec2 a_pos;
void main() { gl_Position = vec4(a_pos,0,1); }
`;

const FS = `
precision highp float;

#define MAX_N 22

uniform vec2  u_res;
uniform float u_time;
uniform int   u_n;
uniform vec2  u_sites[MAX_N];
uniform float u_hues[MAX_N];

const float TAU = 6.28318530718;

vec3 hsl2rgb(float h, float s, float l) {
  float c = (1.0 - abs(2.0*l - 1.0)) * s;
  float x = c * (1.0 - abs(mod(h*6.0, 2.0) - 1.0));
  float m = l - c*0.5;
  vec3 rgb;
  if      (h < 1.0/6.0) rgb = vec3(c, x, 0);
  else if (h < 2.0/6.0) rgb = vec3(x, c, 0);
  else if (h < 3.0/6.0) rgb = vec3(0, c, x);
  else if (h < 4.0/6.0) rgb = vec3(0, x, c);
  else if (h < 5.0/6.0) rgb = vec3(x, 0, c);
  else                   rgb = vec3(c, 0, x);
  return rgb + m;
}

void main() {
  vec2 uv = gl_FragCoord.xy / u_res;

  float minD1 = 1e9;
  float minD2 = 1e9;
  int   near  = 0;

  for (int i = 0; i < MAX_N; i++) {
    if (i >= u_n) break;
    float d = distance(uv, u_sites[i]);
    if (d < minD1) {
      minD2 = minD1;
      minD1 = d;
      near  = i;
    } else if (d < minD2) {
      minD2 = d;
    }
  }

  // Edge detection: distance to second-nearest - first-nearest
  float edge = minD2 - minD1;

  // Cell color: hue from site, slow breathing lightness
  float h = u_hues[near];
  float breathe = 0.5 + 0.08 * sin(u_time * 0.4 + float(near) * 1.2);
  float saturation = 0.55 + 0.15 * sin(u_time * 0.3 + h * 3.0);

  vec3 col = hsl2rgb(h, saturation, breathe);

  // Edge darkening
  float edgeFactor = smoothstep(0.0, 0.012, edge);
  col *= edgeFactor;

  // Slight distance shading within cell (centroid darker)
  float cellShade = 0.85 + 0.15 * smoothstep(0.0, 0.25, minD1);
  col *= cellShade;

  // Site glow
  float siteBright = 1.0 - smoothstep(0.0, 0.014, minD1);
  col = mix(col, vec3(0.9, 0.9, 1.0) * breathe * 2.0, siteBright * 0.35);

  // Vignette
  float vign = 1.0 - 0.4 * length(uv - 0.5) * 2.0;
  col *= vign;

  gl_FragColor = vec4(col, 1.0);
}
`;

function compile(type, src) {
  const s = gl.createShader(type);
  gl.shaderSource(s, src);
  gl.compileShader(s);
  if (!gl.getShaderParameter(s, gl.COMPILE_STATUS)) {
    console.error(gl.getShaderInfoLog(s)); return null;
  }
  return s;
}

const prog = gl.createProgram();
gl.attachShader(prog, compile(gl.VERTEX_SHADER,   VS));
gl.attachShader(prog, compile(gl.FRAGMENT_SHADER, FS));
gl.linkProgram(prog);
gl.useProgram(prog);

const buf = gl.createBuffer();
gl.bindBuffer(gl.ARRAY_BUFFER, buf);
gl.bufferData(gl.ARRAY_BUFFER, new Float32Array([-1,-1, 1,-1, -1,1, 1,1]), gl.STATIC_DRAW);
const aPos = gl.getAttribLocation(prog, 'a_pos');
gl.enableVertexAttribArray(aPos);
gl.vertexAttribPointer(aPos, 2, gl.FLOAT, false, 0, 0);

const uRes   = gl.getUniformLocation(prog, 'u_res');
const uTime  = gl.getUniformLocation(prog, 'u_time');
const uN     = gl.getUniformLocation(prog, 'u_n');
const uSites = gl.getUniformLocation(prog, 'u_sites[0]');
const uHues  = gl.getUniformLocation(prog, 'u_hues[0]');

// ─── Sites ────────────────────────────────────────────────────────────────────

const N = 18;

const sites = Array.from({ length: N }, (_, i) => {
  const angle = (i / N) * Math.PI * 2 + Math.random() * 0.4;
  const r = 0.15 + Math.random() * 0.32;
  return {
    x: 0.5 + r * Math.cos(angle) + (Math.random() - 0.5) * 0.1,
    y: 0.5 + r * Math.sin(angle) + (Math.random() - 0.5) * 0.1,
    vx: (Math.random() - 0.5) * 0.0012,
    vy: (Math.random() - 0.5) * 0.0012,
    hue: i / N,
    orbitR:     0.05 + Math.random() * 0.12,
    orbitSpeed: (0.04 + Math.random() * 0.06) * (Math.random() < 0.5 ? 1 : -1),
    orbitPhase: Math.random() * Math.PI * 2,
    baseX: 0, baseY: 0,
  };
});

// Store base positions
for (const s of sites) { s.baseX = s.x; s.baseY = s.y; }

// ─── Resize ───────────────────────────────────────────────────────────────────

let W, H;
function resize() {
  W = canvas.width = innerWidth;
  H = canvas.height = innerHeight;
  gl.viewport(0, 0, W, H);
}
resize(); addEventListener('resize', resize);

// ─── Render loop ──────────────────────────────────────────────────────────────

const t0 = performance.now();
const flatSites = new Float32Array(N * 2);
const flatHues  = new Float32Array(N);

function frame(ts) {
  const t = (ts - t0) / 1000;

  // Move sites
  for (let i = 0; i < sites.length; i++) {
    const s = sites[i];
    // Gentle orbital motion around base position
    s.x = s.baseX + s.orbitR * Math.cos(t * s.orbitSpeed + s.orbitPhase);
    s.y = s.baseY + s.orbitR * Math.sin(t * s.orbitSpeed + s.orbitPhase) * (H / W);

    // Slow drift of base
    s.baseX += s.vx;
    s.baseY += s.vy;

    // Bounce off edges
    if (s.baseX < 0.05 || s.baseX > 0.95) s.vx *= -1;
    if (s.baseY < 0.05 || s.baseY > 0.95) s.vy *= -1;

    flatSites[i * 2]     = s.x;
    flatSites[i * 2 + 1] = s.y;
    flatHues[i] = s.hue;
  }

  gl.uniform2f(uRes,  W, H);
  gl.uniform1f(uTime, t);
  gl.uniform1i(uN,    N);
  gl.uniform2fv(uSites, flatSites);
  gl.uniform1fv(uHues,  flatHues);

  gl.drawArrays(gl.TRIANGLE_STRIP, 0, 4);
  requestAnimationFrame(frame);
}

requestAnimationFrame(frame);

// Click: add a new site (up to MAX_N)
canvas.addEventListener('click', e => {
  if (sites.length >= 22) return;
  const x = e.clientX / W;
  const y = 1 - e.clientY / H;
  sites.push({
    x, y, vx: (Math.random()-0.5)*0.001, vy: (Math.random()-0.5)*0.001,
    hue: Math.random(),
    orbitR: 0.02, orbitSpeed: 0.05, orbitPhase: 0,
    baseX: x, baseY: y,
  });
});
</script>
</body>
</html>
